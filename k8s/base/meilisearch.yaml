apiVersion: v1
kind: Service
metadata:
  name: blog-meilisearch
  namespace: portfolio
  labels:
    app.kubernetes.io/name: blog-meilisearch
    app.kubernetes.io/part-of: portfolio
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      port: 7700
      targetPort: 7700
  selector:
    app.kubernetes.io/name: blog-meilisearch
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: blog-meilisearch
  namespace: portfolio
  labels:
    app.kubernetes.io/name: blog-meilisearch
    app.kubernetes.io/part-of: portfolio
spec:
  serviceName: blog-meilisearch
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: blog-meilisearch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: blog-meilisearch
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: meilisearch
          image: getmeili/meilisearch:v1.11
          ports:
            - containerPort: 7700
              name: http
          env:
            - name: MEILI_ENV
              value: production
            - name: MEILI_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: blog-secret
                  key: MEILISEARCH_MASTER_KEY
          livenessProbe:
            httpGet:
              path: /health
              port: 7700
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 7700
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: meilisearch-data
              mountPath: /meili_data
  volumeClaimTemplates:
    - metadata:
        name: meilisearch-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
