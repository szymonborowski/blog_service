services:
  blog-app:
    container_name: blog-app
    build:
      context: .
      dockerfile: docker/dev/php/Dockerfile
      target: php-runtime
      args:
        UID: ${UID}
        GID: ${GID}
    command: php-fpm
    environment:
      DB_HOST: blog-db
      DB_CONNECTION: ${DB_CONNECTION}
      DB_PORT: ${DB_PORT}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - ./src:/var/www/html
    depends_on:
      - blog-db
    expose:
      - "9000"
    networks:
      - blog-internal
      - microservices

  blog-nginx:
    container_name: blog-nginx
    image: nginx:1.27
    volumes:
      - ./src:/var/www/html
      - ./docker/dev/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - blog-app
    networks:
      - blog-internal
      - microservices

  blog-consumer:
    container_name: blog-consumer
    build:
      context: .
      dockerfile: docker/dev/php/Dockerfile
      target: php-runtime
      args:
        UID: ${UID}
        GID: ${GID}
    command: php artisan rabbitmq:consume-users
    environment:
      DB_HOST: blog-db
      DB_CONNECTION: ${DB_CONNECTION}
      DB_PORT: ${DB_PORT}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - ./src:/var/www/html
    depends_on:
      - blog-db
    restart: always
    networks:
      - blog-internal
      - microservices

  blog-db:
    container_name: blog-db
    image: mysql:8
    ports:
      - "127.0.0.1:3308:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - blog_db_data:/var/lib/mysql
    networks:
      - blog-internal

networks:
  blog-internal:
    driver: bridge
  microservices:
    external: true

volumes:
  blog_db_data: