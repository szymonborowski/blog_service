x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  blog-app:
    build:
      context: .
      dockerfile: docker/dev/php/Dockerfile
      target: php-runtime
      args:
        UID: ${UID}
        GID: ${GID}
    command: php-fpm
    environment:
      DB_HOST: blog-db
      DB_CONNECTION: ${DB_CONNECTION}
      DB_PORT: ${DB_PORT}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - ./src:/var/www/html
      - blog_vendor:/var/www/html/vendor
    depends_on:
      blog-db:
        condition: service_healthy
    expose:
      - "9000"
    networks:
      - blog-internal
      - microservices
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.50'

  blog-nginx:
    image: nginx:1.27
    volumes:
      - ./src:/var/www/html
      - ./docker/dev/nginx/default.conf:/etc/nginx/conf.d/default.conf
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.blog.rule=Host(`blog.microservices.local`)"
      - "traefik.http.routers.blog.entrypoints=websecure"
      - "traefik.http.routers.blog.tls=true"
      - "traefik.http.services.blog.loadbalancer.server.port=80"
    depends_on:
      blog-app:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/80'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - blog-internal
      - web
      - microservices
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: '0.25'

  blog-consumer:
    build:
      context: .
      dockerfile: docker/dev/php/Dockerfile
      target: php-runtime
      args:
        UID: ${UID}
        GID: ${GID}
    command: php artisan rabbitmq:consume-users
    environment:
      DB_HOST: blog-db
      DB_CONNECTION: ${DB_CONNECTION}
      DB_PORT: ${DB_PORT}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - ./src:/var/www/html
      - blog_vendor:/var/www/html/vendor
    depends_on:
      blog-db:
        condition: service_healthy
    restart: always
    networks:
      - blog-internal
      - microservices
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'

  blog-db:
    image: mysql:8
    ports:
      - "127.0.0.1:3308:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - blog_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - blog-internal
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.50'

networks:
  blog-internal:
    driver: bridge
  web:
    external: true
  microservices:
    external: true

volumes:
  blog_db_data:
  blog_vendor:
